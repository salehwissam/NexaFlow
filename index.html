<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topo">
    <div class="topo-texto">
      <h1>NexaFlow</h1>
      <p>Painel pessoal de foco e produtividade</p>
    </div>
    <button class="botao-topo">Tema</button>
  </header>

  <main class="dashboard">
    <section class="card">
      <h2>Relógio</h2>
      <div id="clock" class="clock-box">00:00:00</div>
    </section>

    <section class="card">
  <h2>Tarefas</h2>
  <div class="filters">
  <button data-filter="todas" class="filter-btn active">Todas</button>
  <button data-filter="pendentes" class="filter-btn">Pendentes</button>
  <button data-filter="concluidas" class="filter-btn">Concluídas</button>
  </div>

  <div class="progress-area">
  <p id="progressText">0 de 0 tarefas concluídas</p>

  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>
  </div>

  <div class="task-area">
    <input type="text" id="taskInput" placeholder="Digite uma tarefa">
    <button id="addTaskBtn">Adicionar</button>
  </div>

  <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Pomodoro</h2>
      <p>Área de foco em construção...</p>
    </section>

    <section class="card">
      <h2>Metas do dia</h2>
      <p>Área de metas em construção...</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
